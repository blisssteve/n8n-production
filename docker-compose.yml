# n8n Production Stack (Phase 1)
#
# Single-instance n8n with Postgres backend and filesystem binary storage.
# No workers/queue mode yet — that comes in Phase 2 with Redis + R2.
#
# Deploy via Dokploy:
# - Create a Compose application pointing at this repo
# - Set secrets in Dokploy Environment tab (see .env.example)
# - Add domain n8n.emerald.vet in Domains tab
# - Deploy
#
# After Phase 1 is stable:
# - Add Redis service
# - Set EXECUTIONS_MODE=queue
# - Add worker service(s)
# - Migrate binary storage to R2/S3-compatible

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      # Use Dokploy named volumes for backups support
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.12.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # Timezone
      TZ: ${TZ:-Australia/Brisbane}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Australia/Brisbane}

      # Database (Postgres)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_POOL_SIZE: ${DB_POSTGRESDB_POOL_SIZE:-10}

      # Public URL and hostname
      N8N_HOST: ${N8N_HOST:-n8n.emerald.vet}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${WEBHOOK_URL:-https://n8n.emerald.vet/}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}

      # Encryption (MUST match source instance for migration)
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      # Binary data storage (filesystem for Phase 1)
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      N8N_BINARY_DATA_STORAGE_PATH: /home/node/.n8n/binaryData

      # Task runners (external mode for Python support)
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_NATIVE_PYTHON_RUNNER: "true"

      # Node.js memory and payload limits
      NODE_OPTIONS: --max-old-space-size=${NODE_MEMORY:-4096}
      N8N_PAYLOAD_SIZE_MAX: ${N8N_PAYLOAD_SIZE_MAX:-10240}

      # Execution data pruning (keep DB lean)
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-7}
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: ${EXECUTIONS_DATA_PRUNE_MAX_COUNT:-1000}
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "false"

      # Community nodes
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom/nodes

      # Security
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"

      # Proxy headers (Traefik/Cloudflare)
      N8N_PROXY_HOPS: "1"
      N8N_TRUST_PROXY_HEADER: x-forwarded-for
      N8N_TRUST_PROXY: "true"

      # CORS for Vapi integration (from source)
      N8N_CORS_ALLOWED_HEADERS: Content-Type,Authorization,x-vapi-secret
      N8N_CORS_ALLOWED_ORIGINS: https://dashboard.vapi.ai,https://mcp-proxy.vapi.ai
      N8N_CORS_ALLOWED_METHODS: GET,POST,PUT,DELETE,OPTIONS
      N8N_CORS_ALLOW_CREDENTIALS: "true"

      # Feature toggles
      N8N_TEMPLATES_ENABLED: "true"
      N8N_PERSONALIZATION_ENABLED: "true"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "true"

    volumes:
      # Named volume for n8n data (workflows, credentials, binary data)
      - n8n_data:/home/node/.n8n
      # Named volume for binary storage (explicit, for backup support)
      - n8n_binary_data:/home/node/.n8n/binaryData
      # Custom nodes mount (populated during migration)
      - n8n_custom_nodes:/home/node/.n8n/custom/nodes

    networks:
      - n8n-network

    labels:
      # Traefik labels for Dokploy routing
      traefik.enable: "true"
      traefik.http.routers.n8n-prod.rule: Host(`${N8N_HOST:-n8n.emerald.vet}`)
      traefik.http.routers.n8n-prod.entrypoints: websecure
      traefik.http.routers.n8n-prod.tls: "true"
      traefik.http.services.n8n-prod.loadbalancer.server.port: "5678"
      # Attach to Dokploy's Traefik network
      traefik.docker.network: dokploy-network

  task-runners:
    image: n8nio/runners:latest
    restart: unless-stopped
    depends_on:
      - n8n
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_LAUNCHER_LOG_LEVEL: info
    networks:
      - n8n-network

networks:
  n8n-network:
    driver: bridge
  # External network to connect to Dokploy's Traefik
  dokploy-network:
    external: true

volumes:
  n8n_postgres_data:
    name: n8n_postgres_data
  n8n_data:
    name: n8n_data
  n8n_binary_data:
    name: n8n_binary_data
  n8n_custom_nodes:
    name: n8n_custom_nodes
